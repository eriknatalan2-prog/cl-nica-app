<!DOCTYPE html>
<html>
<body>

<h2>Mis citas</h2>

<button onclick="verCitas()">Mostrar citas</button>

<ul id="lista"></ul>

<script>
function verCitas() {

  let citas = JSON.parse(localStorage.getItem("citas")) || [];
  let lista = document.getElementById("lista");

  lista.innerHTML = "";

  if(citas.length === 0){
    alert("No hay citas guardadas");
    return;
  }

  citas.forEach(function(cita){
    let item = document.createElement("li");
    item.textContent = cita.nombre + " - " + cita.fecha + " " + cita.hora;
    lista.appendChild(item);
  });

}
</script>

</body>
</html>
