<!DOCTYPE html>
<html>
<body>

<h2>Login / Registro</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Contraseña"><br><br>

<button onclick="register()">Registrarse</button>
<button onclick="login()">Entrar</button>

<hr>

<div id="app" style="display:none;">

<h3 id="bienvenida"></h3>

<h2>Agenda de citas 📅</h2>

<input id="nombre" placeholder="Nombre"><br><br>
<input id="fecha" type="date"><br><br>

<h3>Horarios disponibles (1h40)</h3>
<div id="horarios"></div>

<button onclick="agendar()">Confirmar cita</button>

<h3>Historial de citas</h3>
<div id="historial"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAPlke6nRxrhXSUzqTG9vvrOAcSm8r45q0",
  authDomain: "citas-erik.firebaseapp.com",
  projectId: "citas-erik",
  storageBucket: "citas-erik.firebasestorage.app",
  messagingSenderId: "124724431934",
  appId: "1:124724431934:web:c021b499a5aaf5855a556f"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userUID = null;
let horaSeleccionada = "";
window.ROL = "paciente";


// 🔐 REGISTRO
function register() {

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => alert("Usuario creado"))
    .catch(err => alert(err.message));
}


// 🔐 LOGIN
function login() {

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then((user) => {

      userUID = user.user.uid;

      window.ROL = email.includes("admin@clinica.com")
        ? "admin"
        : "paciente";

      document.getElementById("app").style.display = "block";

      document.getElementById("bienvenida").innerText =
        (window.ROL === "admin")
          ? "Bienvenido Dr. 👨‍⚕️ Admin"
          : "Bienvenido Paciente 👤";

      cargarHistorial();
      cargarHorarios();

    })
    .catch(err => alert(err.message));
}


// 🧠 HORARIOS 1H40
function generarHorarios() {

  let horarios = [];
  let inicio = new Date();
  inicio.setHours(8,0,0,0);

  while (inicio.getHours() < 20) {

    let h = inicio.getHours().toString().padStart(2,'0');
    let m = inicio.getMinutes().toString().padStart(2,'0');

    horarios.push(`${h}:${m}`);

    inicio = new Date(inicio.getTime() + 100 * 60000);
  }

  return horarios;
}


// 🟢 HORARIOS DISPONIBLES
async function cargarHorarios() {

  let fecha = document.getElementById("fecha").value;
  if (!fecha) return;

  let horarios = generarHorarios();

  let snap = await db.collection("citas")
    .where("fecha", "==", fecha)
    .get();

  let ocupados = [];

  snap.forEach(doc => {
    ocupados.push(doc.data().hora);
  });

  let div = document.getElementById("horarios");
  div.innerHTML = "";

  horarios.forEach(hora => {

    let ocupado = ocupados.includes(hora);

    div.innerHTML += `
      <button 
        onclick="seleccionarHora('${hora}')"
        ${ocupado ? "disabled" : ""}
        style="margin:5px;
        padding:10px;
        background:${ocupado ? '#ff6b6b' : '#51cf66'};
        color:white"
      >
        ${hora} ${ocupado ? '(ocupado)' : '(libre)'}
      </button>
    `;

  });

}


// 🟢 SELECCIONAR HORA
function seleccionarHora(hora) {
  horaSeleccionada = hora;
  alert("Seleccionado: " + hora);
}


// 🟢 AGENDAR
async function agendar() {

  let nombre = document.getElementById("nombre").value;
  let fecha = document.getElementById("fecha").value;

  if (!nombre || !fecha || !horaSeleccionada) {
    alert("Completa todo");
    return;
  }

  await db.collection("citas").add({
    uid: userUID,
    nombre,
    fecha,
    hora: horaSeleccionada
  });

  alert("Cita guardada 🔥");

  cargarHistorial();
  cargarHorarios();

}


// 📁 HISTORIAL (ADMIN + PACIENTE)
function cargarHistorial() {

  let ref = db.collection("citas");

  if (window.ROL !== "admin") {
    ref = ref.where("uid", "==", userUID);
  }

  ref.onSnapshot(snap => {

    let div = document.getElementById("historial");
    div.innerHTML = "";

    if (snap.empty) {
      div.innerHTML = "<p>No hay citas</p>";
      return;
    }

    snap.forEach(doc => {

      let c = doc.data();

      let botones = "";

      if (window.ROL === "admin") {
        botones = `
          <button onclick="eliminar('${doc.id}')">❌ Eliminar</button>
          <button onclick="editar('${doc.id}', '${c.nombre}')">✏️ Editar</button>
        `;
      }

      div.innerHTML += `
        <div style="border:1px solid #ccc;padding:10px;margin:5px">
          👤 ${c.nombre} <br>
          📅 ${c.fecha} <br>
          ⏰ ${c.hora} <br><br>
          ${botones}
        </div>
      `;

    });

  });

}


// 🔴 ELIMINAR
function eliminar(id) {
  db.collection("citas").doc(id).delete();
}


// ✏️ EDITAR
function editar(id, nombre) {

  let nuevo = prompt("Editar nombre:", nombre);

  if (nuevo) {
    db.collection("citas").doc(id).update({
      nombre: nuevo
    });
  }

}


// 🔁 CAMBIO DE FECHA
document.addEventListener("change", (e) => {
  if (e.target.id === "fecha") {
    cargarHorarios();
  }
});

</script>

</body>
</html>
